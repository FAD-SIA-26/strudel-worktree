name: Release Package

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Build Release Tarball
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build release package
        run: pnpm release:github

      - name: Capture tarball path
        id: tarball
        run: |
          TAR_PATH="$(find .artifacts -maxdepth 1 -name '*.tgz' | head -n 1)"
          if [ -z "$TAR_PATH" ]; then
            echo "No tarball found in .artifacts" >&2
            exit 1
          fi
          echo "path=$TAR_PATH" >> "$GITHUB_OUTPUT"
          echo "name=$(basename "$TAR_PATH")" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.tarball.outputs.path }}
          generate_release_notes: true

      - name: Upload workflow artifact
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.tarball.outputs.name }}
          path: ${{ steps.tarball.outputs.path }}
